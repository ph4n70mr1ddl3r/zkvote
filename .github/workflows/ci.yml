name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'
            - name: Install Circom
              run: |
                  curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                  source "$HOME/.cargo/env"
                  cargo install --locked circom
                  echo "$HOME/.cargo/bin" >> $GITHUB_PATH
            - name: Install dependencies
              run: npm ci
            - name: Generate test accounts
              run: npm run generate-accounts
            - name: Build Merkle tree
              run: npm run build-tree
            - name: Compile circuits
              run: npm run compile-circuits
              timeout-minutes: 15
            - name: Run tests
              run: npm test
              timeout-minutes: 10
