version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 10
      reviewers: []
      labels:
          - 'dependencies'
      commit-message:
          prefix: 'deps'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 5
      labels:
          - 'dependencies'
          - 'github-actions'
      commit-message:
          prefix: 'ci'
